<main class="app-shell-root" [attr.data-app-title]="appTitle">
  <header class="federal-banner">
    <div class="app-shell-frame federal-banner__inner">
      <span class="federal-banner__eyebrow">CMS.gov</span>
      <span class="federal-banner__text">Centers for Medicare &amp; Medicaid Services</span>
    </div>
  </header>

  <section class="top-nav">
    <div class="app-shell-frame top-nav__inner">
      <div class="top-nav__brand-block">
        <span class="top-nav__product">MEPS</span>
        <span class="top-nav__brand">{{ appTitle }}</span>
      </div>

      @if (isAppRoute) {
        <nav class="top-nav__links" aria-label="Primary navigation">
          @for (group of navGroups; track group.label) {
            @if (group.children?.length) {
              <button class="top-nav__trigger" mat-button [matMenuTriggerFor]="featureMenu">{{ group.label }}</button>
              <mat-menu #featureMenu="matMenu">
                @for (item of group.children; track item.label) {
                  <button
                    mat-menu-item
                    [routerLink]="item.path"
                    [queryParams]="item.queryParams"
                  >
                    {{ item.label }}
                  </button>
                }
              </mat-menu>
            } @else if (group.path) {
              <a class="top-nav__link" mat-button [routerLink]="group.path" [routerLinkActive]="'active'">
                {{ group.label }}
              </a>
            }
          }
        </nav>
      } @else {
        <div class="top-nav__context">Demo desktop workflow</div>
      }
    </div>
  </section>

  <section class="app-shell-content">
    <div class="app-shell-frame app-shell-frame--content">
      <router-outlet></router-outlet>
    </div>
  </section>
</main>
